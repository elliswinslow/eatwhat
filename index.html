<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>汉成帝后宫文字养成卡片</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 12% 8%, #ffe8ef 0, transparent 32%),
        radial-gradient(circle at 88% 92%, #dff6ef 0, transparent 36%),
        linear-gradient(135deg, #fffaf4, #f7fbff);
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: #4f4a45;
    }

    .phone {
      width: 360px;
      height: 740px;
      border-radius: 34px;
      padding: 12px;
      background: linear-gradient(145deg, #ffffff, #fff8ee);
      border: 1px solid rgba(213, 180, 135, 0.75);
      box-shadow: 0 18px 42px rgba(148, 107, 62, 0.22);
      overflow: hidden;
      position: relative;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 7px;
      left: 50%;
      width: 92px;
      height: 6px;
      border-radius: 99px;
      transform: translateX(-50%);
      background: #dfd4c4;
      z-index: 5;
    }

    .screen {
      height: 100%;
      padding: 14px 8px 8px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .screen::-webkit-scrollbar {
      display: none;
    }

    .hero {
      padding: 14px;
      border-radius: 23px;
      margin-bottom: 10px;
      background:
        linear-gradient(rgba(255,255,255,0.74), rgba(255,255,255,0.74)),
        url("https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=800&q=80");
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(225, 195, 145, 0.95);
      box-shadow: 0 8px 18px rgba(155, 112, 64, 0.13);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      color: #9b613b;
      letter-spacing: 1px;
    }

    .sub {
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.5;
      color: #776b5e;
    }

    .card {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255,255,255,0.93);
      border: 1px solid #ead9bd;
      box-shadow: 0 6px 14px rgba(142, 103, 58, 0.09);
    }

    .card.pink {
      border-color: #f3cbd8;
      background: rgba(255, 249, 252, 0.95);
    }

    .card.green {
      border-color: #cce8dc;
      background: rgba(249, 255, 251, 0.95);
    }

    .card.gold {
      border-color: #e9d295;
      background: rgba(255, 253, 241, 0.96);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #96633f;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 999px;
      background: #fff5e4;
      border: 1px solid #ead2aa;
      color: #93724c;
      font-size: 11px;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .stat {
      padding: 7px;
      border-radius: 13px;
      background: #fffdf8;
      border: 1px solid #efe0c9;
      font-size: 12px;
      line-height: 1.45;
    }

    .stat b {
      color: #8f5e38;
    }

    .bar {
      height: 7px;
      margin-top: 4px;
      border-radius: 999px;
      background: #eee7dd;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f2c078, #f2a7bf, #9edfc4);
      transition: width 0.35s ease;
    }

    .story-img {
      display: none;
      width: 100%;
      height: 96px;
      object-fit: cover;
      border-radius: 15px;
      border: 1px solid #e5d1b7;
      margin-bottom: 8px;
    }

    .story-title {
      margin: 0 0 7px;
      font-size: 16px;
      color: #77543d;
    }

    .text {
      font-size: 13px;
      line-height: 1.72;
      color: #554d46;
    }

    .small {
      font-size: 12px;
      line-height: 1.65;
      color: #685f55;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-top: 9px;
    }

    button {
      width: 100%;
      padding: 10px 11px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #fff1d9, #fff0f6, #ecfff7);
      border: 1px solid rgba(224, 192, 150, 0.96);
      box-shadow: 0 5px 10px rgba(143, 102, 61, 0.13);
      color: #4f4a45;
      font-size: 13px;
      font-weight: 700;
      text-align: left;
      line-height: 1.35;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:active {
      transform: scale(0.985);
      filter: brightness(0.98);
    }

    button:disabled {
      opacity: 0.48;
      filter: grayscale(0.5);
      cursor: not-allowed;
    }

    .mini-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .mini-card {
      padding: 8px;
      border-radius: 14px;
      background: #fffefb;
      border: 1px solid #eadfca;
      font-size: 12px;
      line-height: 1.48;
    }

    .mini-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
      font-weight: 700;
      color: #9b6845;
    }

    .log {
      min-height: 38px;
      padding: 8px;
      border-radius: 13px;
      border: 1px dashed #dbc59e;
      background: #fffdf7;
      font-size: 12px;
      line-height: 1.55;
      color: #6b6156;
    }

    .footer {
      padding: 3px 0 8px;
      text-align: center;
      font-size: 11px;
      color: #9a9186;
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="screen">
      <section class="hero">
        <h1>🏯 汉成帝后宫札记</h1>
        <div class="sub">你是刘骜 · 未央宫生活 · 后妃社交 · 宴饮赏赐 · 月回合养成</div>
      </section>

      <section class="card pink">
        <div class="title-row">
          <span>👑 皇帝面板</span>
          <span class="badge" id="timeText"></span>
        </div>
        <div class="grid">
          <div class="stat">姓名：<b id="nameText"></b></div>
          <div class="stat">年龄：<b id="ageText"></b></div>
          <div class="stat">地点：<b id="locationText"></b></div>
          <div class="stat">活动：<b id="activityText"></b></div>
          <div class="stat">私库：<b id="moneyText"></b></div>
          <div class="stat">物品：<b id="itemText"></b></div>
          <div class="stat">
            心情：<b id="moodText"></b>
            <div class="bar"><span id="moodBar"></span></div>
          </div>
          <div class="stat">
            皇嗣议题：<b id="heirText"></b>
            <div class="bar"><span id="heirBar"></span></div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="title-row">
          <span>📊 人物属性</span>
          <span class="badge" id="turnText"></span>
        </div>
        <div class="grid">
          <div class="stat">体质：<b id="bodyText"></b><div class="bar"><span id="bodyBar"></span></div></div>
          <div class="stat">武力：<b id="martialText"></b><div class="bar"><span id="martialBar"></span></div></div>
          <div class="stat">学识：<b id="learningText"></b><div class="bar"><span id="learningBar"></span></div></div>
          <div class="stat">威望：<b id="prestigeText"></b><div class="bar"><span id="prestigeBar"></span></div></div>
        </div>
      </section>

      <section class="card gold">
        <div class="title-row">
          <span>📖 当前剧情</span>
          <span class="badge">月度推进</span>
        </div>
        <img class="story-img" id="storyImage" alt="剧情图片" />
        <h2 class="story-title" id="storyTitle"></h2>
        <div class="text" id="storyText"></div>
        <div class="options" id="optionBox"></div>
      </section>

      <section class="card green">
        <div class="title-row">
          <span>🌸 后宫万象</span>
          <span class="badge">四条月闻</span>
        </div>
        <div class="small" id="haremNewsText"></div>
      </section>

      <section class="card pink">
        <div class="title-row">
          <span>💠 后妃好感</span>
          <span class="badge">70爱慕 · 100至深</span>
        </div>
        <div class="mini-list" id="consortBox"></div>
      </section>

      <section class="card">
        <div class="title-row">
          <span>🏛 朝堂与宗亲</span>
          <span class="badge">关系网</span>
        </div>
        <div class="mini-list" id="ministerBox"></div>
      </section>

      <section class="card gold">
        <div class="title-row">
          <span>🛒 可购物品</span>
          <span class="badge">a / b / c</span>
        </div>
        <div class="mini-list" id="shopBox"></div>
      </section>

      <section class="card green">
        <div class="title-row">
          <span>⚠️ 主线预警</span>
          <span class="badge" id="warningBadge"></span>
        </div>
        <div class="small" id="warningText"></div>
      </section>

      <section class="card">
        <div class="title-row">
          <span>📝 行动记录</span>
          <span class="badge" id="influenceText"></span>
        </div>
        <div class="log" id="logText"></div>
      </section>

      <div class="footer">✨ 点击选项即可推进一月，剧情与属性实时刷新 ✨</div>
    </div>
  </main>

      return Math.max(0, Math.min(100, value));
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function moodMap(value) {
      if (value >= 85) return "兴致甚好 😊";
      if (value >= 65) return "心绪平稳 🙂";
      if (value >= 45) return "略觉疲惫 😐";
      if (value >= 25) return "烦闷不展 😟";
      return "身心俱倦 ⚠️";

    function getDateInfo() {
      const monthNames = ["正月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "腊月"];
      const absMonth = 4 + gameState.monthPointer;
      const globalYear = Math.floor(absMonth / 12) + 1;
      const monthIndex = absMonth % 12;
      const monthName = monthNames[monthIndex];

      let season = "春季";
      if (monthIndex >= 3 && monthIndex <= 5) season = "夏季";
      if (monthIndex >= 6 && monthIndex <= 8) season = "秋季";
      if (monthIndex >= 9 || monthIndex <= 0) season = "冬季";

      let reign = "建始";
      let reignYear = globalYear;

      if (globalYear >= 5 && globalYear <= 8) {
        reign = "河平";
        reignYear = globalYear - 4;
      } else if (globalYear >= 9 && globalYear <= 12) {
        reign = "阳朔";
        reignYear = globalYear - 8;
      } else if (globalYear >= 13 && globalYear <= 16) {
        reign = "鸿嘉";
        reignYear = globalYear - 12;
      } else if (globalYear >= 17 && globalYear <= 20) {
        reign = "永始";
        reignYear = globalYear - 16;
      } else if (globalYear >= 21 && globalYear <= 24) {
        reign = "元延";
        reignYear = globalYear - 20;
      } else if (globalYear >= 25) {
        reign = "绥和";
        reignYear = globalYear - 24;
      }

      return {
        text: `${reign}${reignYear}年${season}${monthName}`,
        reign,
        reignYear,
        season,
        monthName,
        globalYear,
        monthIndex
      };
    }

        const button = document.createElement("button");
        const allowed = !option.condition || option.condition();

        button.textContent = allowed ? option.text : `${option.text} 🔒 条件不足`;
        button.disabled = !allowed;

        button.addEventListener("click", () => {
          handleOptionClick(option);
        });

        dom.optionBox.appendChild(button);
      });
    }

    function renderConsorts() {
      dom.consortBox.innerHTML = "";

      Object.keys(gameState.npcs).forEach(key => {
        const npc = gameState.npcs[key];
        const card = document.createElement("div");
        card.className = "mini-card";
        card.innerHTML = `
          <div class="mini-top">
            <span>🌺 ${npc.name}</span>
            <span>${npc.affection}/100</span>
          </div>
          <div>${npc.role}｜${npc.place}</div>
          <div>性格：${npc.trait}</div>
          <div>衣饰：${npc.outfit}</div>
          <div class="bar"><span style="width:${clamp(npc.affection)}%"></span></div>
        `;
        dom.consortBox.appendChild(card);
      });
    }

    function renderMinisters() {
      dom.ministerBox.innerHTML = "";

      Object.keys(gameState.ministers).forEach(key => {
        const npc = gameState.ministers[key];
        const card = document.createElement("div");
        card.className = "mini-card";
        card.innerHTML = `
          <div class="mini-top">
            <span>🏛 ${npc.name}</span>
            <span>${npc.relation}/100</span>
          </div>
          <div>${npc.role}</div>
          <div>评语：${npc.trait}</div>
          <div class="bar"><span style="width:${clamp(npc.relation)}%"></span></div>
        `;
        dom.ministerBox.appendChild(card);
      });
    }

    function renderShop() {
      dom.shopBox.innerHTML = "";

      shopItems.forEach(item => {
        const button = document.createElement("button");
        button.textContent = `${item.code}. ${item.name}｜${item.price}金｜${item.desc}`;
        button.disabled = gameState.money < item.price;
        button.addEventListener("click", () => buyItem(item));
        dom.shopBox.appendChild(button);
      });
    }

    function handleOptionClick(option) {
      applyEffects(option.effects || {});

      gameState.currentStoryId = option.nextStoryId;
      gameState.turn += 1;
      gameState.monthPointer += 1;

      if ((4 + gameState.monthPointer) % 12 === 0) {
        gameState.age += 1;
      }

      gameState.money += 5;
      gameState.heirPressure = clamp(gameState.heirPressure + 1);

      refreshHaremNews();
      triggerMonthlyEvent();

      const effectText = buildEffectText(option.effects || {});
      gameState.lastLog =
        `你选择了：${option.text}\n` +
        `${effectText}\n` +
        `少府月入：私库 +5金。`;

      updateUI();
    }

    function buyItem(item) {
      if (gameState.money < item.price) return;

      gameState.money -= item.price;
      applyEffects(item.effects);

      gameState.lastLog =
        `你购买了：${item.code}. ${item.name}\n` +
        `${buildEffectText(item.effects)}\n` +
        `当前物品：${gameState.items.join("、")}`;

      updateUI();
    }

    function applyEffects(effects) {
      Object.keys(effects).forEach(key => {
        const value = effects[key];

        if (key === "addItem" && Array.isArray(value)) {
          value.forEach(item => {
            if (!gameState.items.includes(item)) {
              gameState.items.push(item);
            }
          });
          return;
        }

        if (key === "money") {
          gameState.money = Math.max(0, gameState.money + value);
          return;
        }

        if (key === "moodValue") {
          gameState.moodValue = clamp(gameState.moodValue + value);
          return;
        }

        if (key === "heirPressure") {
          gameState.heirPressure = clamp(gameState.heirPressure + value);
          return;
        }

        if (key === "wangInfluence") {
          gameState.wangInfluence = clamp(gameState.wangInfluence + value);
          return;
        }

        if (key in gameState.attrs) {
          gameState.attrs[key] = clamp(gameState.attrs[key] + value);
          return;
        }

        if (key in gameState.npcs) {
          gameState.npcs[key].affection = clamp(gameState.npcs[key].affection + value);
          return;
        }

        if (key in gameState.ministers) {
          gameState.ministers[key].relation = clamp(gameState.ministers[key].relation + value);
        }
      });
    }

    function buildEffectText(effects) {
      const lines = [];

      Object.keys(effects).forEach(key => {
        const value = effects[key];
        const sign = typeof value === "number" && value >= 0 ? "+" : "";

        if (key === "money") lines.push(`私库 ${sign}${value}金`);
        if (key === "body") lines.push(`体质 ${sign}${value}`);
        if (key === "martial") lines.push(`武力 ${sign}${value}`);
        if (key === "learning") lines.push(`学识 ${sign}${value}`);
        if (key === "prestige") lines.push(`威望 ${sign}${value}`);
        if (key === "moodValue") lines.push(`心情 ${sign}${value}`);
        if (key === "heirPressure") lines.push(`皇嗣议题 ${sign}${value}`);
        if (key === "wangInfluence") lines.push(`王氏影响 ${sign}${value}`);

        if (gameState.npcs[key]) {
          lines.push(`${gameState.npcs[key].name} 好感 ${sign}${value}`);
        }

        if (gameState.ministers[key]) {
          lines.push(`${gameState.ministers[key].name} 关系 ${sign}${value}`);
        }

        if (key === "addItem") {
          lines.push(`获得物品：${value.join("、")}`);
        }
      });

      return lines.length ? lines.join("\n") : "本月没有明显数值变化。";
    }

    function refreshHaremNews() {
      const pool = [...haremNewsPool].sort(() => Math.random() - 0.5).slice(0, 4);
      const date = getDateInfo();
      gameState.haremNews = pool.map((text, index) => `${index + 1}. 「${date.text}」${text}`);
    }

    function triggerMonthlyEvent() {
      const roll = Math.random();

      if (roll < 0.25) {
        gameState.moodValue = clamp(gameState.moodValue + 1);
        gameState.lastLog += "\n月度小事：宫中饮食顺口，心情 +1。";
      } else if (roll < 0.5) {
        gameState.attrs.learning = clamp(gameState.attrs.learning + 1);
        gameState.lastLog += "\n月度小事：尚书呈来旧制简牍，学识 +1。";
      } else if (roll < 0.75) {
        gameState.attrs.prestige = clamp(gameState.attrs.prestige + 1);
        gameState.lastLog += "\n月度小事：宫中礼数平稳，威望 +1。";
      } else {
        gameState.wangInfluence = clamp(gameState.wangInfluence + 1);
        gameState.lastLog += "\n月度小事：王氏宗亲入宫问安，王氏影响 +1。";
      }
    }
  </script>
</body>
</html>
